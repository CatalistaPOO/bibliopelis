<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioPelis - Tu Videoteca Digital</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>



<body style="background-color: #0a0b10; color: #e6edf3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0;">

<header style="padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; background-color: #0a0b10;">
    <h1 style="margin: 0; font-size: 1.8rem; letter-spacing: 2px;">
        Biblio<span style="color: #00d2ff; text-shadow: 0 0 10px #00d2ff;">Pelis</span>
    </h1>

<!--    <nav>-->
<!--        <a th:href="@{/crearpeli}"-->
<!--           style="background: linear-gradient(45deg, #007bbd, #00d2ff); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; display: inline-block;">-->
<!--            + Añadir Película-->
<!--        </a>-->
<!--    </nav>-->
</header>

<!--Esta linea equivale a insertar fragment-navbar.html -->
<div th:replace="~{fragment_navbar :: navBar}"></div>

<main class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">

    <section class="search-section" style="margin: 2rem 0;">
        <form th:action="@{/buscarpeli}" method="post"
              style="display: flex; gap: 10px; background: #161b22; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <select name="buscarGenero"
                    style="background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; flex-grow: 1;">
                <option value="0">Todos los géneros</option>
                <option th:each="g : ${generosexistentes}"
                        th:value="${g.idGenero}"
                        th:text="${g.nombre}">Género
                </option>
            </select>

            <input type="text" name="buscarTitulo" placeholder="Buscar por título..."
                   style="background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; flex-grow: 1;"
                   th:value="${buscarTitulo} ">

            <button type="submit"
                    style="background: linear-gradient(45deg, #007bbd, #00d2ff); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Buscar
            </button>

            <div th:if="${numeroResultados != null}"
                 style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
                <span style="font-size: 0.9rem; color: #8b949e;">Encontrados:</span>
                <span style="background: #00d2ff; color: #ffffff; padding: 5px 12px; border-radius: 4px; font-weight: bold; box-shadow: 0 0 10px #00d2ff;">
            [[${numeroResultados}]]
        </span>
            </div>
        </form>
    </section>

    <section class="movie-grid"
             style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 2rem;">

        <article class="movie-card" th:each="p : ${peliculas}"
                 style="background: #161b22; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; display: flex; flex-direction: column;">

            <div class="card-img" style="position: relative; height: 350px;">
                <img th:src="${p.urlThumbnail}"
                     alt="Poster"
                     style="width: 100%; height: 100%; object-fit: cover;"
                     onerror="this.src='https://via.placeholder.com/300x450/0d1117/00d2ff?text=Sin+Imagen'">

                <span class="badge" th:if="${p.genero != null}"
                      th:text="${p.genero.nombre}"
                      style="position: absolute; top: 10px; left: 10px; background: #00d2ff; color: #000; padding: 4px 10px; font-size: 0.75rem; font-weight: bold; border-radius: 4px;">
                      Género
                </span>
            </div>

            <div class="card-info"
                 style="padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column;">
                <h3 th:text="${p.titulo}"
                    style="margin: 0 0 25px 0; font-size: 1.1rem; color: #e6edf3; flex-grow: 1; display: flex; align-items: center; justify-content: center;">
                    Título de Película
                </h3>

                <div class="card-buttons" style="margin-top: auto;">
                    <a th:href="@{/detalle/{id}(id=${p.id})}"
                       style="background: linear-gradient(45deg, #007bbd, #00d2ff); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; display: block; text-align: center;">
                        Ver Detalles
                    </a>
                </div>
            </div>
        </article>

    </section>

    <div th:if="${#lists.isEmpty(peliculas)}" style="text-align: center; padding: 50px; color: #8b949e;">
        <p>No hay películas disponibles.</p>
    </div>
</main>

</body>
</html>
